<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Todo esto se pone cuando escribes "html5" y le das enter, te da el formato en automático, como cuando metías a pata las librerías en C XD-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
    <!--Esta es la fuente Google Sans, quiero que mis páginas les recuerden a páginas de Google-->

    <link rel="preload" href="css/style.css" as="style">
    <!--El "preload" como relación del link, es para que sea lo primero que cargue de la página, y ya después el resto, pero tiene que ir junto con el link href tradicional-->
    <!--Como quien dice: "Te aviso que te voy a pedir que carques ESTE archivo, para que lo tengas a la mano"-->
    <link rel="preload" href="css/normalize.css" as="style">
    <link href="css/style.css" rel="stylesheet">
    <!-- link, tal cual, vincula o conecta un archivo con otro, en este caso, el html con el css, y rel se le pone para decir qué relación tiene este archivo con el html, en este caso, que es la hoja de estilos, o sea, la hoja que describe de qué forma se tiene que ver cada elemento del html-->

    <!--Es de esta forma que podremos vincular un head igual para todas las subpáginas que hagamos!...-->
    <link href="css/normalize.css" rel="stylesheet">
    <title>Piedra Angular</title>
</head>


<footer class="pie-de-página">

</footer>

</html>
